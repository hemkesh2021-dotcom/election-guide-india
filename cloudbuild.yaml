# ============================================
# Cloud Build — CI/CD Pipeline for Google Cloud Run
# ============================================
# Trigger: Push to main branch → Build → Test → Deploy
#
# Google Services Used:
#   - Google Cloud Build      → CI/CD orchestration
#   - Google Artifact Registry → Docker image storage
#   - Google Cloud Run         → Serverless container deployment
#   - Google Secret Manager    → Secure API key injection
#
# Setup:
#   gcloud builds submit --config cloudbuild.yaml
#
# Auto-deploy trigger:
#   Cloud Console → Cloud Build → Triggers → Connect GitHub repo

steps:
  # Step 1 — Install dependencies
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['ci', '--production=false']
    id: 'install'

  # Step 2 — Run unit tests (no server required)
  - name: 'node:20-alpine'
    entrypoint: 'npx'
    args: ['vitest', 'run', 'tests/matching.test.js', 'tests/security.test.js']
    id: 'unit-tests'
    waitFor: ['install']

  # Step 3 — Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:latest'
      - '.'
    id: 'build'
    waitFor: ['unit-tests']

  # Step 4 — Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}'
    id: 'push'
    waitFor: ['build']

  # Step 5 — Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--set-secrets=GOOGLE_API_KEY=gemini-api-key:latest'
    id: 'deploy'
    waitFor: ['push']

# Docker images to store in Artifact Registry
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:latest'

# Substitution variables (override via trigger or command line)
substitutions:
  _SERVICE_NAME: 'election-guide'
  _REGION: 'asia-south1'
  _REPO_NAME: 'election-guide-repo'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Build timeout
timeout: '600s'
